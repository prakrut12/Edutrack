<div class="table-wrap">
    <table>
        <thead><tr><th>Roll No</th><th>Student</th><th>Subject</th><th>Classes</th><th>Present</th><th>Attendance</th></tr></thead>
        <tbody>
            {% for row in rows %}
            <tr>
                <td>{{ row.roll_no }}</td>
                <td><strong>{{ row.full_name }}</strong></td>
                <td>{{ row.subject_name }}</td>
                <td>{{ row.total_classes }}</td>
                <td>{{ row.present_count }}</td>
                <td><span class="danger-badge">{{ row.percentage }}%</span></td>
            </tr>
            {% else %}
            <tr><td colspan="6">No students are below the selected attendance threshold.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
